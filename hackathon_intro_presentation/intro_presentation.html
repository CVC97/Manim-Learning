---

### Was ist *Manim*?

- Kurz für: **M**athematical **Anim**ations 

- *Python*-Bibliothek hinter *3Blue1Brow*

---

### Warum *Manim* lernen?

- Veranschaulichung physikalischer Phänomene 

- **einfache Syntax**

	- viele *high-level* Funktionen

	- **Fokus auf Physik / didaktischen Darstellung** 

	- weniger auf (tiefergehenden) Programmierkenntnissen

---

### Idee Hackathon

- kurze Zeit Gruppen ergebnisorientiert

---

### Idee des Hackathons

- Arbeit in 2er-3er Gruppen

	- so eigenständig wie möglich

	- Ergänzung der Stärken innerhalb der Gruppe

- Zum Abschluss: fertige / präsentierfähige Lehranimation

---

### Finale Präsentation (5-10 Minuten)

- Was ist dargestellt?

- Warum dieses Projekt?

- Wie wurde es umgesetzt?

- Wieso diese Darstellung?

---

### Wettbewerb / Voting

- **Fokus Physik / Aussehen**
	- physikalische Komplexität
	- Schönheit


- **Fokus Lehrwert / Didaktik**
	- didaktischer Lehrwert
	- sinnvolle Aufarbeitung des Problems
	- Anleitungen im Video
	- Lerneffekt

---

### Wettbewerb / Voting

- jeder ranked seine 3 Favoriten in beidem Kathegorien
	- 1. Platz: je **4 Punkte**
	- 2. Platz: je **2 Punkte**
	- 3. Platz: je **1 Punkt**

- 50% Publikumsvoting / 50% Jury
	
---

### Projekte

- Empfehlung: **Thema der Studieneingangsphase**

	- Mechanik, E-Dynamik

	- Was hätte mir selbst geholfen?

- aber prinzipiell: freie Themenwahl

---

### Ablauf heute

- Evaluation

- Installation *manim* / Bearbeiten der Selbstlernmaterialien (1 Stunde)

- Idee- / Themenfindung (1 Stunde)

- Gruppenfindung + Arbeit am Projekt

---

### Themenfindung

- Alleine: erste Idee (10 Minuten)

- Kleingruppen: gegenseitiges "Refinement" eurer Ideen (20 Minuten)

- Große Gruppe: Vorstellung eurer Ideen (30 Minuten)

---

### Themenfindung

- Was hätte mir selbst geholfen?

- Was habe ich als komplex empfunden?

- Wo hätten anschaulichere Darstellung helfen können?

- Zu welchem Thema habe / hätte ich eine Skizze gezeichnet?

- Das habe ich sehr gut verstanden und würde es gerne erklären.

- Danach haben mich meine Freunde immer gefragt.
